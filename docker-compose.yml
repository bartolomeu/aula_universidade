services:
  mysql:
    image: mysql:8.0  # Use the desired MySQL version
    container_name: mysql_ueg
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pass123
      MYSQL_DATABASE: aula
      MYSQL_USER: aula
      MYSQL_PASSWORD: pas123
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql/

volumes:
  mysql_data:
